<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hogwarts Registry{% endblock %}</title>
    {% load django_bootstrap5 %}
    {% bootstrap_css %}
    <style>
        body {
            background-color: #1a1a1a;
            color: #f8f9fa;
        }

        .navbar {
            background-color: #740001 !important;
            border-bottom: 3px solid #d3a625;
        }

        .card {
            background-color: #2b2b2b;
            color: white;
            border: 1px solid #444;
        }

        .btn-magic {
            background-color: #d3a625;
            color: #740001;
            font-weight: bold;
            border: none;
        }

        .btn-magic:hover {
            background-color: #ae0001;
            color: #d3a625;
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .overflow-hidden {
            overflow: hidden;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'lista_personajes' %}"> POTTER-APP</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    {% bootstrap_javascript %}
</body>

</html>
